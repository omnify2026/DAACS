# ===== 의사결정 로그 =====
decisions:
  - id: "D001"
    decision: "메인 코드베이스 = DAACS_v2-dy (Python)"
    reason: "per-project lock, LangGraph, FastAPI, WebSocket 이미 구현"
  - id: "D002"
    decision: "GUI Prototype을 v1.0에 포함"
    reason: "에이전트 시각화가 핵심 차별화 요소"
  - id: "D003"
    decision: "새 디렉토리 DAACS_OS에서 작업"
    reason: "프로덕션 구조로 클린 스타트, 기존 코드는 레퍼런스"
  - id: "D004"
    decision: "에이전트 8종 (GUI 매핑)"
    reason: "CEO, PM, Developer, Reviewer, DevOps, Marketer, Designer, CFO"
  - id: "D005"
    decision: "WebSocket은 이벤트 스트리밍 전용, 명령은 REST API"
    reason: "관심사 분리 — WS는 단방향 push, REST는 request/response"
  - id: "D006"
    decision: "CLI/.daacs/skills 548개 스킬을 에이전트 번들로 재활용"
    reason: "기존 자산 최대 활용, core/support 2단계로 로드 우선순위 관리"
  - id: "D007"
    decision: "스킬 로드 전략 = core_first (max 12개/에이전트)"
    reason: "LLM 컨텍스트 윈도우 제한 대응, 핵심 스킬만 우선 로드"
  - id: "D008"
    decision: "Smart Router는 수익화 단계로 보류"
    reason: "daacs_config.yaml에 역할별 모델 이미 정의, 핵심 기능(워크트리) 우선"
  - id: "D009"
    decision: "엔진 포팅: Selective Port + Adapt 방식"
    reason: "DAACS_v2-dy의 14+ 노드를 7개 핵심 노드로 축소. 기존 8-agent 시스템 + WebSocket + Safety Guard 유지하며 LangGraph 패턴 적용"
  - id: "D010"
    decision: "WorkflowEngine은 LangGraph 패키지 없이 직접 구현"
    reason: "langgraph 의존성 최소화. StateGraph 패턴만 차용하여 node→edge 루프 구현. 향후 체크포인팅 필요 시 langgraph 연동"

