[package]
name = "daacs"
version = "2.0.0"
edition = "2021"
description = "DAACS CLI - Rust-based Vibe Coder Tool"
authors = ["DAACS Team"]
license = "MIT"
default-run = "daacs"

[dependencies]
# Async Runtime
tokio = { version = "1.32", features = ["full"] }

# CLI Framework
clap = { version = "4.4", features = ["derive"] }

# TUI Framework (Removed)
ratatui = "0.26"
crossterm = "0.27"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# HTTP Client (for API-based models: GLM, DeepSeek)
reqwest = { version = "0.11", features = ["json", "multipart"] }

# Error Handling
anyhow = "1.0"
thiserror = "1.0"

# Async Trait
async-trait = "0.1"

# Logging
log = "0.4"
env_logger = "0.11"
colored = "2.1"

# Configuration
config = "0.14"
directories = "5.0"
dirs = "5.0"
uuid = { version = "1.8", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Code Parsing (Smart Context)
tree-sitter = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-python = "0.20"
tree-sitter-typescript = "0.20"
inquire = "0.7"
indicatif = "0.17"
console = "0.15"

# Process Control (for CLI wrapping)
portable-pty = "0.8"

# Async Channel (Event System)
flume = "0.11"

# Git Integration (Time Machine / Git Checkpoint)
git2 = "0.18"

# Concurrency
parking_lot = "0.12"
once_cell = "1.18"
sha2 = "0.10.9"
regex = "1.12.2"
walkdir = "2.5.0"

[profile.release]
opt-level = 3
lto = true
strip = true
