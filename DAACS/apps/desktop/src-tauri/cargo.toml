[package]
name = "daacs_desktop"
version = "0.1.0"
edition = "2021"
description = "DAACS Desktop (Tauri + Rust backend)"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-fs = "2"
infra_error = { path = "../../../crates/infra-error" }
infra_logger = { path = "../../../crates/infra-logger" }
ai_core = { path = "../../../crates/ai-core" }
tracing = "0.1"

[features]
default = []
