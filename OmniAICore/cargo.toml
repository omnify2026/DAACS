[package]
name = "omni_ai_core"
version = "0.1.0"
edition = "2021"
description = "Shared AI prompts and utilities for Omnify projects"
authors = ["OmnifyAI"]
license = "MIT"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
omni_utilities = { path = "../OmniUtilities" }
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
